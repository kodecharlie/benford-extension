<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 420px;
      padding: 15px;
      margin: 0;
      background-color: #1e1e1e;
      color: #e0e0e0;
    }
    h3 {
      margin-top: 0;
      color: #ffffff;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }
    .stats {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 15px;
    }
    .chart-row {
      margin-bottom: 12px;
    }
    .digit-label {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 3px;
      color: #fff;
    }
    .bar-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #2a2a2a;
      padding: 6px;
      border-radius: 4px;
    }
    .bar-wrapper {
      display: flex;
      align-items: center;
      position: relative;
    }
    .bar {
      height: 14px;
      border-radius: 2px;
      transition: width 0.5s ease-out;
    }
    .bar.observed {
      background-color: #f1c40f; /* Yellow */
    }
    .bar.benford {
      background-color: #2ecc71; /* Green */
    }
    .bar-text {
      font-size: 11px;
      margin-left: 8px;
      color: #ccc;
      white-space: nowrap;
    }
    .legend {
      display: flex;
      gap: 15px;
      margin-top: 15px;
      font-size: 12px;
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .box {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <h3>Benford's Law Analyzer</h3>
  <div class="stats" id="status">Analyzing webpage numbers...</div>
  
  <div id="chart"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="box" style="background-color: #f1c40f;"></div>
      <span>Observed (Page)</span>
    </div>
    <div class="legend-item">
      <div class="box" style="background-color: #2ecc71;"></div>
      <span>Expected (Benford)</span>
    </div>
  </div>

  <script src="benford.js"></script>
</body>
</html>
